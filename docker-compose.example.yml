# Example Docker Compose file for running slowpoke
services:
  slowpoke:
    image: ghcr.io/jeph/slowpoke:latest
    container_name: slowpoke_app
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:?DISCORD_TOKEN is required}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID:?DISCORD_APPLICATION_ID is required}
      CODEX_LB_API_KEY: ${CODEX_LB_API_KEY:?CODEX_LB_API_KEY is required}
